name: Deploy GitHub Pages

# ⚠️ ANTES DO PRIMEIRO DEPLOY (obrigatório, uma vez):
# GitHub → Settings → Pages → Build and deployment → Source: "GitHub Actions"
# https://github.com/PatrickIssl/gado/settings/pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: gado-control/package-lock.json

      - name: Install
        working-directory: gado-control
        run: npm ci

      - name: Build
        working-directory: gado-control
        run: npm run build:ghpages

      - name: Preparar GitHub Pages (SPA)
        working-directory: gado-control
        run: |
          cd dist/gado-control/browser
          cp index.html 404.html
          touch .nojekyll

      - name: Inject Supabase env
        working-directory: gado-control
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_KEY" ]; then
            echo "::warning::SUPABASE_URL ou SUPABASE_KEY não configurados nos Secrets do GitHub."
            echo "O site abre, mas login/dados não funcionam até você adicionar as secrets."
            exit 0
          fi
          find dist/gado-control/browser -name '*.js' -exec sed -i \
            "s|SUA_URL_SUPABASE|$SUPABASE_URL|g;s|SUA_CHAVE_ANON_SUPABASE|$SUPABASE_KEY|g" {} +
          echo "Supabase configurado no build."
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: gado-control/dist/gado-control/browser

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
