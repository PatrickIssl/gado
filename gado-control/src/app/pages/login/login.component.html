<div class="auth-page">
  <div class="auth-card">
    <div class="auth-brand">
      <div class="auth-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75">
          <path d="M4 12c0-2 1.5-4 4-4.5C10 7 12 5 14 5c2.5 0 4 2 4 4.5 0 3-2 5.5-5 6.5"/>
        </svg>
      </div>
      <h1>GadoControl</h1>
      <p>Acesse sua fazenda</p>
    </div>

    @if (erro) {
      <div class="alert alert-error">{{ erro }}</div>
    }

    <form (ngSubmit)="entrar()">
      <label>
        E-mail
        <input type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
      </label>
      <label>
        Senha
        <input type="password" [(ngModel)]="senha" name="senha" required autocomplete="current-password" />
      </label>
      <button type="submit" class="btn btn-primary btn-block" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="auth-footer">
      Não tem conta?
      <a routerLink="/cadastro">Cadastre sua fazenda</a>
    </p>
  </div>
</div>
